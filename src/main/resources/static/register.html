<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velour Keno — Crear Cuenta</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>

<main class="auth-container">
    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
            <div class="logo-symbol">
                <svg viewBox="0 0 100 100" width="60" height="60">
                    <polygon points="50,5 85,25 85,75 50,95 15,75 15,25"
                        fill="none" stroke="#6B0F1A" stroke-width="2"/>
                    <polygon points="50,18 74,31 74,69 50,82 26,69 26,31"
                        fill="none" stroke="#C9A84C" stroke-width="1"/>
                    <circle cx="50" cy="50" r="10" fill="#6B0F1A"/>
                    <circle cx="50" cy="50" r="5" fill="#C9A84C"/>
                </svg>
            </div>
            <h1 class="logo-name">VELOUR</h1>
            <p class="logo-slogan">Números. Poder. Distinción.</p>
        </div>

        <h2 class="auth-title">Crear cuenta</h2>
        <p class="auth-subtitle">Únete y recibe 1,000 créditos de bienvenida</p>

        <!-- Mensaje de error/éxito global -->
        <div class="alert alert-error" id="errorMsg" style="display:none"></div>
        <div class="alert alert-success" id="successMsg" style="display:none"></div>

        <!-- Formulario registro -->
        <form id="registerForm" novalidate>

            <div class="form-group">
                <label for="username">Nombre de usuario</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="ej: jugador123"
                    autocomplete="username"
                    required
                />
                <span class="field-hint">Solo letras, números y guión bajo</span>
                <span class="field-error" id="usernameError"></span>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="email@ejemplo.com"
                    autocomplete="email"
                    required
                />
                <span class="field-error" id="emailError"></span>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-password-wrapper">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Mínimo 8 caracteres"
                        autocomplete="new-password"
                        required
                    />
                    <button type="button"
                        class="toggle-password"
                        aria-label="Mostrar contraseña"
                        onclick="togglePassword('password')">
                        👁
                    </button>
                </div>
                <!-- Indicador de fuerza de contraseña -->
                <div class="password-strength" id="passwordStrength">
                    <div class="strength-bar">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                    <span class="strength-label" id="strengthLabel"></span>
                </div>
                <span class="field-error" id="passwordError"></span>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar contraseña</label>
                <div class="input-password-wrapper">
                    <input
                        type="password"
                        id="confirmPassword"
                        name="confirmPassword"
                        placeholder="Repite tu contraseña"
                        autocomplete="new-password"
                        required
                    />
                    <button type="button"
                        class="toggle-password"
                        aria-label="Mostrar contraseña"
                        onclick="togglePassword('confirmPassword')">
                        👁
                    </button>
                </div>
                <span class="field-error" id="confirmPasswordError"></span>
            </div>

            <button type="submit" class="btn-primary" id="registerBtn">
                <span class="btn-text">Crear cuenta</span>
                <span class="btn-loader" style="display:none">Creando cuenta...</span>
            </button>

        </form>

        
        <p class="auth-footer">
            ¿Ya tienes cuenta?
            <a href="/login.html">Inicia sesión</a>
        </p>

    </div>
</main>

<script src="/js/auth.js"></script>
</body>
</html>
