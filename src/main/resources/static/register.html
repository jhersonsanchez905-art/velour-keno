<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velour Keno — Crear Cuenta</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>

<main class="auth-container">
    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
            <div class="logo-symbol">
                <svg viewBox="0 0 100 100" width="60" height="60">
                    <polygon points="50,5 85,25 85,75 50,95 15,75 15,25"
                        fill="none" stroke="#6B0F1A" stroke-width="2"/>
                    <polygon points="50,18 74,31 74,69 50,82 26,69 26,31"
                        fill="none" stroke="#C9A84C" stroke-width="1"/>
                    <circle cx="50" cy="50" r="10" fill="#6B0F1A"/>
                    <circle cx="50" cy="50" r="5" fill="#C9A84C"/>
                </svg>
            </div>
            <h1 class="logo-name">VELOUR</h1>
            <p class="logo-slogan">Números. Poder. Distinción.</p>
        </div>

        <h2 class="auth-title">Crear cuenta</h2>
        <p class="auth-subtitle">Únete y recibe 1,000 créditos de bienvenida</p>

        <!-- Mensaje de error/éxito global -->
        <div class="alert alert-error" id="errorMsg" style="display:none"></div>
        <div class="alert alert-success" id="successMsg" style="display:none"></div>

        <!-- Formulario registro -->
        <form id="registerForm" novalidate>

            <div class="form-group">
                <label for="username">Nombre de usuario</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="ej: jugador123"
                    autocomplete="username"
                    required
                />
                <span class="field-hint">Solo letras, números y guión bajo</span>
                <span class="field-error" id="usernameError"></span>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="email@ejemplo.com"
                    autocomplete="email"
                    required
                />
                <span class="field-error" id="emailError"></span>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-password-wrapper">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Mínimo 8 caracteres"
                        autocomplete="new-password"
                        required
                    />
                    <button type="button"
                        class="toggle-password"
                        aria-label="Mostrar contraseña"
                        onclick="togglePassword('password')">
                        👁
                    </button>
                </div>
                <!-- Indicador de fuerza de contraseña -->
                <div class="password-strength" id="passwordStrength">
                    <div class="strength-bar">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                    <span class="strength-label" id="strengthLabel"></span>
                </div>
                <span class="field-error" id="passwordError"></span>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar contraseña</label>
                <div class="input-password-wrapper">
                    <input
                        type="password"
                        id="confirmPassword"
                        name="confirmPassword"
                        placeholder="Repite tu contraseña"
                        autocomplete="new-password"
                        required
                    />
                    <button type="button"
                        class="toggle-password"
                        aria-label="Mostrar contraseña"
                        onclick="togglePassword('confirmPassword')">
                        👁
                    </button>
                </div>
                <span class="field-error" id="confirmPasswordError"></span>
            </div>

            <button type="submit" class="btn-primary" id="registerBtn">
                <span class="btn-text">Crear cuenta</span>
                <span class="btn-loader" style="display:none">Creando cuenta...</span>
            </button>

        </form>

        <div class="auth-divider"><span>o</span></div>

        <!-- Google OAuth2 -->
        <a href="/oauth2/authorization/google" class="btn-google">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continuar con Google
        </a>

        <p class="auth-footer">
            ¿Ya tienes cuenta?
            <a href="/login.html">Inicia sesión</a>
        </p>

    </div>
</main>

<script src="/js/auth.js"></script>
</body>
</html>
