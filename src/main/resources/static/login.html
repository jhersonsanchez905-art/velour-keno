<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velour Keno — Iniciar Sesión</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>

<main class="auth-container">
    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
            <div class="logo-symbol">
                <svg viewBox="0 0 100 100" width="60" height="60">
                    <polygon points="50,5 85,25 85,75 50,95 15,75 15,25"
                        fill="none" stroke="#6B0F1A" stroke-width="2"/>
                    <polygon points="50,18 74,31 74,69 50,82 26,69 26,31"
                        fill="none" stroke="#C9A84C" stroke-width="1"/>
                    <circle cx="50" cy="50" r="10" fill="#6B0F1A"/>
                    <circle cx="50" cy="50" r="5" fill="#C9A84C"/>
                </svg>
            </div>
            <h1 class="logo-name">VELOUR</h1>
            <p class="logo-slogan">Números. Poder. Distinción.</p>
        </div>

        <h2 class="auth-title">Bienvenido de nuevo</h2>
        <p class="auth-subtitle">Ingresa tus credenciales para continuar</p>

        <!-- Mensaje de error global -->
        <div class="alert alert-error" id="errorMsg" style="display:none"></div>

        <!-- Formulario login -->
        <form id="loginForm" novalidate>

            <div class="form-group">
                <label for="usernameOrEmail">Usuario o Email</label>
                <input
                    type="text"
                    id="usernameOrEmail"
                    name="usernameOrEmail"
                    placeholder="usuario o email@ejemplo.com"
                    autocomplete="username"
                    required
                />
                <span class="field-error" id="usernameOrEmailError"></span>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-password-wrapper">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required
                    />
                    <button type="button"
                        class="toggle-password"
                        aria-label="Mostrar contraseña"
                        onclick="togglePassword('password')">
                        👁
                    </button>
                </div>
                <span class="field-error" id="passwordError"></span>
            </div>

            <button type="submit" class="btn-primary" id="loginBtn">
                <span class="btn-text">Iniciar Sesión</span>
                <span class="btn-loader" style="display:none">Cargando...</span>
            </button>

        </form>

        
        <p class="auth-footer">
            ¿No tienes cuenta?
            <a href="/register.html">Regístrate aquí</a>
        </p>

    </div>
</main>

<script src="/js/auth.js"></script>
</body>
</html>
