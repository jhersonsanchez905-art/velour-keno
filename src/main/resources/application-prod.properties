# ===== CONFIGURACIÓN PRODUCCIÓN — RENDER =====

# Base de datos PostgreSQL de Render (viene de variable de entorno)
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA producción
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Pool de conexiones optimizado para Render free tier
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JWT desde variable de entorno
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# CORS producción
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://velour-keno.onrender.com}

# Puerto que Render asigna dinámicamente
server.port=${PORT:8080}

spring.application.name=velour-keno