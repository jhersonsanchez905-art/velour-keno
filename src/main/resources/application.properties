# ===== CONFIGURACIÓN LOCAL (desarrollo) =====

# Servidor
server.port=8080

# Base de datos PostgreSQL local
spring.datasource.url=jdbc:postgresql://localhost:5432/velour_keno
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=velour-keno-secret-key-super-segura-2024-desarrollo
jwt.expiration=86400000

# Nombre de la aplicación
spring.application.name=velour-keno

# CORS — en producción se reemplaza con el dominio de Render
app.cors.allowed-origins=http://localhost:8080