# -------------------------------------------------------------------
# Velour Keno — Integración Continua (CI)
# -------------------------------------------------------------------
# Para agregar el badge de estado a README.md:
# [![Velour Keno CI](https://github.com/jhersonsanchez905-art/velour-keno/actions/workflows/ci.yml/badge.svg)](https://github.com/jhersonsanchez905-art/velour-keno/actions/workflows/ci.yml)
# -------------------------------------------------------------------

name: Velour Keno CI

on:
  push:
    branches:
      - develop
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ===================================================================
# JOB 1: Compilación y pruebas
# ===================================================================
jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    # Servicio de PostgreSQL para los tests
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: velour_keno_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. Clonar el repositorio
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configurar JDK 17 con cache de Maven
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Esperar a que PostgreSQL esté listo
      - name: Esperar PostgreSQL
        run: sleep 10

      # 4. Compilar el proyecto (sin tests) para verificar compilación
      - name: Compilar proyecto
        run: mvn clean compile -B
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/velour_keno_test
          JWT_SECRET: test-secret-for-ci-only
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

      # 5. Ejecutar tests unitarios y de integración
      - name: Ejecutar tests
        run: mvn test -B
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/velour_keno_test
          JWT_SECRET: test-secret-for-ci-only
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          SPRING_PROFILES_ACTIVE: test
        continue-on-error: false

      # 6. Subir reportes de tests (incluso si fallaron)
      - name: Subir reportes de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/

  # ===================================================================
  # JOB 2: Calidad de código
  # ===================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      # 1. Clonar el repositorio
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configurar JDK 17 con cache de Maven
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Verificar advertencias y errores de compilación
      - name: Verificar warnings de compilación
        run: mvn clean compile -B 2>&1 | grep -i "warning\|error" || true
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/velour_keno_test
          JWT_SECRET: test-secret-for-ci-only
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

      # 4. Verificar que la estructura del proyecto existe
      - name: Verificar estructura del proyecto
        run: |
          FILES=(
            "src/main/java/com/velour/keno/KenoApplication.java"
            "src/main/resources/application.properties"
            "Dockerfile"
            "README.md"
          )
          ALL_OK=true
          for FILE in "${FILES[@]}"; do
            if [ -f "$FILE" ]; then
              echo "✅ $FILE encontrado"
            else
              echo "❌ $FILE NO encontrado"
              ALL_OK=false
            fi
          done
          if [ "$ALL_OK" = true ]; then
            echo "✅ Project structure OK"
          else
            echo "❌ Project structure has issues"
            exit 1
          fi
